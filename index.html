<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUSHARR VERMA | CYBER-HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f3ff; --dark-bg: #090a0f; --panel-bg: rgba(0, 243, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--dark-bg); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; margin: 0; padding: 0; min-height: 100vh; background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px); background-size: 30px 30px; }
        
        #animation-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .particle { position: absolute; top: 105vh; color: rgba(0, 243, 255, 0.2); animation: floatUp linear forwards; text-shadow: 0 0 10px rgba(0, 243, 255, 0.3); white-space: nowrap; }
        @keyframes floatUp { 0% { top: 105vh; transform: scale(0.8) rotate(0deg); opacity: 0; } 10% { opacity: 1; transform: scale(1) rotate(10deg); } 90% { opacity: 1; } 100% { top: -10vh; transform: scale(1.2) rotate(180deg); opacity: 0; } }

        #main-content { position: relative; z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 50px 20px; }

        .header { text-align: center; margin-bottom: 40px; text-shadow: 0 0 10px var(--neon-cyan); letter-spacing: 2px; }
        .header h1 { font-weight: 300; font-size: 3em; color: var(--neon-cyan); margin-bottom: 5px; }
        .header p { color: #aaa; font-family: monospace; font-size: 1.1em; margin-bottom: 20px; }
        
        .contact-links { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .contact-links a { color: var(--neon-cyan); text-decoration: none; font-family: monospace; font-size: 1.1em; border: 1px solid var(--neon-cyan); padding: 8px 15px; border-radius: 5px; transition: all 0.3s ease; background: rgba(0, 0, 0, 0.5); }
        .contact-links a:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px var(--neon-cyan); }

        .section-title { color: #fff; font-family: monospace; font-size: 1.5em; border-bottom: 2px dashed var(--neon-cyan); padding-bottom: 10px; margin-bottom: 40px; text-align: center; width: 80%; max-width: 800px; }
        .dashboard { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; width: 100%; max-width: 1000px; margin-bottom: 50px; }
        
        .hub-btn { background: var(--panel-bg); border: 1px solid var(--neon-cyan); border-radius: 10px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05); width: 280px; backdrop-filter: blur(5px); text-decoration: none; }
        .hub-btn:hover { background: rgba(0, 243, 255, 0.15); box-shadow: 0 0 30px rgba(0, 243, 255, 0.4), inset 0 0 20px rgba(0, 243, 255, 0.2); transform: translateY(-5px); }
        .hub-btn i { font-size: 50px; color: var(--neon-cyan); margin-bottom: 20px; text-shadow: 0 0 15px var(--neon-cyan); }
        .hub-btn h2 { color: #fff; font-weight: 400; letter-spacing: 2px; font-size: 1.2em; }

        .ai-terminal { width: 100%; max-width: 800px; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon-cyan); border-radius: 8px; padding: 20px; box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.1), 0 0 20px rgba(0, 0, 0, 0.8); margin-bottom: 40px; backdrop-filter: blur(8px); }
        .ai-header { color: #666; font-family: monospace; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .ai-text { color: #00ff41; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; line-height: 1.6; min-height: 120px; }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background-color: #00ff41; vertical-align: middle; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="animation-layer"></div>

    <div id="main-content">
        <div class="header">
            <h1>TUSHARR VERMA</h1>
            <p>MASTER OF CYBERSECURITY // SECURE SYSTEM AUTHORIZED</p>
            <div class="contact-links">
                <a href="https://linkedin.com/in/tusharr-verma0001" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
                <a href="mailto:vermatushar4577@gmail.com"><i class="fas fa-envelope"></i> Email</a>
            </div>
        </div>

        <div class="section-title">
            <i class="fas fa-folder-tree"></i> > PORTFOLIO
        </div>

        <div class="dashboard">
            <a href="cybersecurity.html" class="hub-btn">
                <i class="fas fa-shield-halved"></i><h2>CYBER SECURITY</h2>
            </a>
            <a href="softwaredev.html" class="hub-btn">
                <i class="fas fa-code"></i><h2>SOFTWARE DEV</h2>
            </a>
            <a href="cloudtech.html" class="hub-btn">
                <i class="fas fa-cloud"></i><h2>CERTIFICATIONS</h2>
            </a>
        </div>

        <div class="ai-terminal">
            <div class="ai-header">
                <span><i class="fas fa-robot"></i> AI_AGENT: AUK</span>
                <span>STATUS: ONLINE</span>
            </div>
            <div class="ai-text">
                <span id="ai-typewriter"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        const animationLayer = document.getElementById('animation-layer');
        const itSymbols = ['fa-shield-halved', 'fa-code', 'fa-server', 'fa-bug', 'fa-terminal', 'fa-network-wired', 'fa-database', 'fa-laptop-code', 'fa-microchip', 'fa-lock', 'fa-wifi'];

        function spawnParticle() {
            if (!animationLayer) return;
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            if (Math.random() < 0.15) {
                particle.innerText = 'TUSHAR VERMA';
                particle.style.fontFamily = 'monospace';
                particle.style.fontWeight = 'bold';
                particle.style.fontSize = Math.floor(Math.random() * 10 + 12) + 'px';
            } else {
                const icon = document.createElement('i');
                const randomIcon = itSymbols[Math.floor(Math.random() * itSymbols.length)];
                icon.className = 'fas ' + randomIcon;
                particle.appendChild(icon);
                particle.style.fontSize = Math.floor(Math.random() * 25 + 15) + 'px';
            }
            
            let startPositionX = Math.random() < 0.5 ? Math.floor(Math.random() * 13 + 2) : Math.floor(Math.random() * 15 + 80);
            particle.style.left = startPositionX + 'vw';
            
            const floatDuration = Math.random() * 15 + 10;
            particle.style.animationDuration = floatDuration + 's';
            
            animationLayer.appendChild(particle);
            setTimeout(() => { particle.remove(); }, floatDuration * 1000);
        }
        setInterval(spawnParticle, 400);

        document.addEventListener("DOMContentLoaded", () => {
            const terminal = document.getElementById("ai-typewriter");
            const aiMessage = "> Hey! I'm Auk, AI Agent Tusharr built to handle his introductions. He's a cybersecurity grad who absolutely geeks out over defending networks and building cool cloud software. When he isn't deep in code or studying tech leaders, he's probably obsessing over perfectly automated engineering. Give him a ring at 0493938137—he’s an awesome guy and a total workhorse for any team!";
            
            let i = 0;
            terminal.textContent = ""; 
            
            function typeWriter() {
                if (i < aiMessage.length) {
                    terminal.textContent += aiMessage.charAt(i);
                    i++;
                    setTimeout(typeWriter, 35);
                }
            }
            setTimeout(typeWriter, 500); 
        });
    </script>
</body>
</html>
