<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUSHAR VERMA | CYBER-HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --dark-bg: #090a0f;
            --panel-bg: rgba(0, 243, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            min-height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Header & Contact Info */
        .header {
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 10px var(--neon-cyan);
            letter-spacing: 2px;
        }
        .header h1 { font-weight: 300; font-size: 3em; color: var(--neon-cyan); margin-bottom: 5px; }
        .header p { color: #aaa; font-family: monospace; font-size: 1.1em; margin-bottom: 20px; }
        
        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }
        .contact-links a {
            color: var(--neon-cyan);
            text-decoration: none;
            font-family: monospace;
            font-size: 1.1em;
            border: 1px solid var(--neon-cyan);
            padding: 8px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .contact-links a:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Portfolio Section */
        .section-title {
            color: #fff;
            font-family: monospace;
            font-size: 1.5em;
            border-bottom: 2px dashed var(--neon-cyan);
            padding-bottom: 10px;
            margin-bottom: 40px;
            text-align: center;
            width: 80%;
            max-width: 800px;
        }

        /* The Interactive Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }
        .hub-btn {
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05);
        }
        .hub-btn:hover {
            background: rgba(0, 243, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4), inset 0 0 20px rgba(0, 243, 255, 0.2);
            transform: translateY(-5px);
        }
        .hub-btn i { 
            font-size: 50px; 
            color: var(--neon-cyan); 
            margin-bottom: 20px; 
            text-shadow: 0 0 15px var(--neon-cyan);
        }
        .hub-btn h2 { color: #fff; font-weight: 400; letter-spacing: 2px; font-size: 1.2em; }

        /* Pop-up Modals */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 700px;
            background: #0d1117;
            color: var(--neon-cyan); font-size: 24px;
            cursor: pointer; background: none; border: none;
        }
        .close-btn:hover { color: #fff; text-shadow: 0 0 10px #fff; }
        .modal h3 { color: var(--neon-cyan); border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .item-card { background: rgba(255,255,255,0.03); border-left: 3px solid var(--neon-cyan); padding: 15px; margin-bottom: 15px; }
        .item-card h4 { color: #fff; margin-bottom: 5px; }
        .item-card p { color: #aaa; font-size: 0.9em; line-height: 1.5; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 50;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>TUSHAR VERMA</h1>
        <p>MASTER OF CYBERSECURITY // SECURE SYSTEM AUTHORIZED</p>
        <div class="contact-links">
            <a href="https://linkedin.com/in/tushar-verma0001" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
            <a href="mailto:vermatushar4577@gmail.com"><i class="fas fa-envelope"></i> Email</a>
        </div>
    </div>

    <div class="section-title">
        > CYBER_PORTFOLIO_MODULES
    </div>

    <div class="dashboard">
        <div class="hub-btn" onclick="openModal('cyberModal')">
            <i class="fas fa-shield-halved"></i>
            <h2>CYBER SECURITY</h2>
        </div>

        <div class="hub-btn" onclick="openModal('webDevModal')">
            <i class="fas fa-code"></i>
            <h2>WEB DEVELOPMENT</h2>
        </div>

        <div class="hub-btn" onclick="openModal('awsModal')">
            <i class="fab fa-aws"></i>
            <h2>AWS CLOUD</h2>
        </div>

        <div class="hub-btn" onclick="openModal('projectsModal')">
            <i class="fas fa-network-wired            border: 2px solid var(--neon-cyan);
        .close-btn {
            position: absolute; top: 15px; right: 20px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            padding: 40px; border-radius: 10px; z-index: 100;
        .modal.active { display: block; }
